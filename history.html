<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch History — AniScout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/shared.css" />
  <style>
    :root {
      --red:    #E8272A;
      --dark:   #08080E;
      --surface:#111119;
      --raised: #18182A;
      --border: rgba(255,255,255,0.07);
      --text:   #F0F0F8;
      --muted:  #7878A0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.7;
      min-height: 100vh;
    }
    h1, h2, h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; line-height: 1.05; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 64px;
      background: rgba(8,8,14,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.08em; text-decoration: none; color: var(--text); }
    .nav-logo span { color: var(--red); }
    .nav-back {
      display: flex; align-items: center; gap: 8px;
      color: var(--muted); font-size: 0.88rem; text-decoration: none;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text); }

    /* PAGE */
    .page-wrap {
      max-width: 1100px; margin: 0 auto;
      padding: 96px 40px 80px;
    }
    .page-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 16px; margin-bottom: 36px;
    }
    .page-title { font-size: 2.8rem; color: var(--text); }
    .page-count { font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
    .clear-btn {
      padding: 8px 18px; background: none;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    /* GRID */
    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
    }
    .h-card {
      position: relative; border-radius: 10px; overflow: hidden;
      background: var(--raised); text-decoration: none; color: var(--text);
      display: flex; flex-direction: column;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .h-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 3px 12px rgba(232,39,42,0.15);
    }
    .h-card-img {
      aspect-ratio: 2/3; overflow: hidden; position: relative; background: var(--raised);
    }
    .h-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .h-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(8,8,14,0.85) 0%, transparent 50%);
    }
    .h-card-score {
      position: absolute; top: 8px; right: 8px;
      background: rgba(8,8,14,0.8); backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; padding: 2px 7px;
      font-size: 0.72rem; font-weight: 700; color: var(--text);
    }
    .h-card-body { padding: 10px 12px 12px; }
    .h-card-title {
      font-size: 0.82rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .h-card-year { font-size: 0.72rem; color: var(--muted); }
    .h-card-del {
      position: absolute; top: 6px; right: 6px;
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(8,8,14,0.8); -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--muted); font-size: 0.9rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; opacity: 0; pointer-events: none;
      transition: opacity 0.15s ease, background 0.15s, color 0.15s;
      z-index: 3;
    }
    .h-card:hover .h-card-del { opacity: 1; pointer-events: auto; }
    .h-card-del:hover { background: rgba(232,39,42,0.85); border-color: var(--red); color: #fff; }

    /* EMPTY */
    .empty-state {
      text-align: center; padding: 80px 20px; color: var(--muted);
    }
    .empty-state h2 { font-size: 2rem; margin-bottom: 12px; color: var(--text); }
    .empty-state p { font-size: 0.9rem; margin-bottom: 24px; }
    .empty-state a {
      display: inline-block; padding: 10px 24px;
      background: var(--red); color: #fff;
      border-radius: 8px; text-decoration: none;
      font-weight: 600; font-size: 0.88rem;
      transition: opacity 0.2s;
    }
    .empty-state a:hover { opacity: 0.85; }

    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .page-wrap { padding: 88px 20px 60px; }
      .history-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }
      .page-title { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">ANI<span>SCOUT</span></a>
    <a href="/" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to Home
    </a>
  </nav>

  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1 class="page-title">Watch History</h1>
        <div class="page-count" id="count"></div>
      </div>
      <button type="button" class="clear-btn" onclick="clearHistory()">Clear History</button>
    </div>
    <div id="grid"></div>
  </div>

  <script>
    function getHistory() {
      try { return JSON.parse(localStorage.getItem('aniscout_recent') || '[]'); } catch { return []; }
    }

    function render() {
      const list = getHistory();
      const grid = document.getElementById('grid');
      const count = document.getElementById('count');

      if (!list.length) {
        count.textContent = '';
        grid.innerHTML = `
          <div class="empty-state">
            <h2>Nothing here yet</h2>
            <p>Anime you view will appear here.</p>
            <a href="/">Explore Anime</a>
          </div>`;
        return;
      }

      count.textContent = `${list.length} title${list.length !== 1 ? 's' : ''}`;
      grid.innerHTML = `<div class="history-grid">${list.map(a => {
        const poster = a.poster || '';
        const score = a.score ? `★ ${parseFloat(a.score).toFixed(1)}` : '';
        return `
          <a href="/anime.html?id=${a.malId}" class="h-card">
            <div class="h-card-img">
              ${poster ? `<img src="${poster}" alt="${(a.title||'').replace(/"/g,'&quot;')}" loading="lazy" onerror="this.style.display='none'">` : ''}
              <div class="h-card-overlay"></div>
              ${score ? `<div class="h-card-score">${score}</div>` : ''}
              <button type="button" class="h-card-del" onclick="event.preventDefault();event.stopPropagation();removeItem(${a.malId})" title="Remove from history">✕</button>
            </div>
            <div class="h-card-body">
              <div class="h-card-title">${a.title || 'Unknown'}</div>
              ${a.year ? `<div class="h-card-year">${a.year}</div>` : ''}
            </div>
          </a>`;
      }).join('')}</div>`;
    }

    function removeItem(malId) {
      const list = getHistory().filter(a => a.malId !== malId);
      localStorage.setItem('aniscout_recent', JSON.stringify(list));
      render();
    }

    function clearHistory() {
      if (!confirm('Clear all watch history?')) return;
      localStorage.removeItem('aniscout_recent');
      render();
    }

    render();
  </script>
</body>
</html>
