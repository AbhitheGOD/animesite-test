<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AniScout — Anime Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:    #E8272A;
      --orange: #F5A01A;
      --dark:   #08080E;
      --surface:#111119;
      --raised: #18182A;
      --border: rgba(255,255,255,0.07);
      --text:   #F0F0F8;
      --muted:  #7878A0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.7;
      overflow-x: hidden;
    }
    h1, h2, h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; line-height: 1.05; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 64px;
      background: rgba(8,8,14,0.85);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.08em; text-decoration: none; color: var(--text); }
    .nav-logo span { color: var(--red); }
    .nav-back {
      display: flex; align-items: center; gap: 8px;
      color: var(--muted); font-size: 0.88rem; text-decoration: none;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text); }
    .nav-back svg { width: 16px; height: 16px; }

    /* HERO BANNER */
    .detail-hero {
      position: relative;
      min-height: 480px;
      display: flex;
      align-items: flex-end;
      padding-top: 64px;
      overflow: hidden;
    }
    .detail-banner {
      position: absolute; inset: 0;
      background-size: cover; background-position: center top;
      filter: brightness(0.35);
    }
    .detail-banner-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(8,8,14,0.2) 0%, rgba(8,8,14,0.7) 60%, rgba(8,8,14,1) 100%);
    }
    .detail-hero-content {
      position: relative; z-index: 2;
      display: flex; gap: 36px; align-items: flex-end;
      max-width: 1100px; margin: 0 auto; padding: 48px 40px 40px;
      width: 100%;
    }
    .detail-poster {
      flex-shrink: 0;
      width: 180px; height: 260px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
      border: 2px solid rgba(255,255,255,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .detail-poster:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 20px 56px rgba(0,0,0,0.8), 0 0 0 2px rgba(232,39,42,0.4);
    }
    .detail-poster-placeholder {
      flex-shrink: 0; width: 180px; height: 260px;
      border-radius: 12px; background: var(--raised);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 0.8rem; border: 2px solid var(--border);
    }
    .detail-meta { flex: 1; }
    .detail-title {
      font-size: clamp(2.2rem, 5vw, 4rem);
      color: var(--text); line-height: 1;
      margin-bottom: 6px;
    }
    .detail-alt-title { color: var(--muted); font-size: 0.9rem; margin-bottom: 16px; }
    .detail-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .badge {
      padding: 4px 12px; border-radius: 6px; font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.04em;
    }
    .badge-type  { background: rgba(232,39,42,0.15); color: var(--red); border: 1px solid rgba(232,39,42,0.3); }
    .badge-rating{ background: rgba(245,160,26,0.12); color: var(--orange); border: 1px solid rgba(245,160,26,0.25); }
    .badge-eps   { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--border); }
    .detail-score {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 2rem; font-family: 'Bebas Neue', sans-serif;
      color: var(--orange); letter-spacing: 0.05em;
    }
    .detail-score-sub { font-family: 'DM Sans', sans-serif; font-size: 0.8rem; color: var(--muted); font-weight: 400; }

    /* MAIN CONTENT */
    .detail-body {
      max-width: 1100px; margin: 0 auto; padding: 48px 40px;
      display: grid; grid-template-columns: 1fr 360px; gap: 48px;
    }

    /* SYNOPSIS */
    .synopsis-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--red); margin-bottom: 14px;
    }
    .synopsis-text {
      color: rgba(240,240,248,0.85); font-size: 0.97rem; line-height: 1.85;
    }
    .synopsis-text.collapsed { display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
    .read-more-btn {
      background: none; border: none; color: var(--red); cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
      padding: 8px 0 0; font-weight: 600;
    }
    .read-more-btn:hover { text-decoration: underline; }

    /* SEASONS */
    .seasons-section { margin-top: 40px; }
    .seasons-title { font-size: 1.6rem; color: var(--text); margin-bottom: 20px; }
    .seasons-grid { display: flex; gap: 12px; flex-wrap: wrap; }
    .season-card {
      background: var(--raised); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 20px; min-width: 140px;
      cursor: pointer; transition: border-color 0.2s, transform 0.2s;
      text-decoration: none;
    }
    .season-card:hover { border-color: rgba(232,39,42,0.4); transform: translateY(-2px); }
    .season-card.active { border-color: var(--red); background: rgba(232,39,42,0.08); box-shadow: inset 3px 0 0 var(--red); }
    .season-name { font-weight: 600; font-size: 0.95rem; color: var(--text); }
    .season-eps  { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

    /* INFO SIDEBAR */
    .info-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; height: fit-content;
    }
    .info-row {
      display: flex; gap: 12px; padding: 12px 0;
      border-bottom: 1px solid var(--border); font-size: 0.9rem;
      transition: background 0.15s ease;
      border-radius: 6px;
      margin: 0 -8px; padding-left: 8px; padding-right: 8px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row:hover { background: rgba(255,255,255,0.03); }
    .info-key  { color: var(--muted); min-width: 90px; flex-shrink: 0; }
    .info-val  { color: var(--text); flex: 1; }
    .info-val a { color: var(--red); text-decoration: none; }
    .info-val a:hover { text-decoration: underline; }
    .info-val .genre-tag {
      display: inline-block; padding: 2px 8px; border-radius: 4px; margin: 2px 2px 2px 0;
      font-size: 0.75rem; background: rgba(232,39,42,0.1);
      color: var(--red); border: 1px solid rgba(232,39,42,0.2);
    }

    /* LOADING / ERROR */
    .state-center {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; gap: 16px; color: var(--muted);
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--red); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border); padding: 32px 40px;
      background: var(--dark); margin-top: 80px;
    }
    .footer-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    }
    .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.08em; }
    .footer-logo span { color: var(--red); }
    .footer-copy { font-size: 0.8rem; color: rgba(120,120,160,0.5); }

    /* SIMILAR SECTION */
    .similar-section { max-width: 1100px; margin: 0 auto; padding: 0 40px 60px; }
    .similar-section-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--red); margin-bottom: 10px; }
    .similar-section-title { font-size: 2.2rem; color: var(--text); margin-bottom: 24px; }
    .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
    .similar-load-more { text-align: center; margin-top: 36px; }
    .load-more-btn {
      padding: 14px 40px; background: var(--raised); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: border-color 0.2s, transform 0.15s;
    }
    .load-more-btn:hover { border-color: rgba(232,39,42,0.4); transform: translateY(-2px); }

    /* Shared card styles (used by similar grid) */
    .anime-card { display: block; text-decoration: none; transition: transform 0.25s ease, box-shadow 0.25s ease; }
    .anime-card:hover { transform: translateY(-5px); box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 2px 8px rgba(232,39,42,0.1); }
    .card-img { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 2/3; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
    .anime-card:hover .card-img img { transform: scale(1.06); }
    .card-img-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(8,8,14,0.7) 0%, transparent 50%); }
    .card-score { position: absolute; top: 8px; right: 8px; background: rgba(8,8,14,0.85); color: var(--orange); font-size: 0.78rem; font-weight: 700; padding: 3px 7px; border-radius: 5px; }
    .card-body { padding: 10px 4px 0; }
    .card-title { font-weight: 600; font-size: 0.88rem; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

    /* TRAILER BUTTON + MODAL */
    .trailer-btn {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 16px; padding: 10px 22px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .trailer-btn:hover { background: rgba(232,39,42,0.15); border-color: rgba(232,39,42,0.4); }
    .trailer-btn svg { width: 16px; height: 16px; flex-shrink: 0; transition: transform 0.2s ease; }
    .trailer-btn:hover svg { transform: scale(1.2); }
    #trailer-modal {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(8,8,14,0.92); align-items: center; justify-content: center;
      -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    }
    #trailer-modal.open { display: flex; }
    .trailer-modal-inner { position: relative; width: min(860px, 90vw); aspect-ratio: 16/9; }
    .trailer-modal-inner iframe { width: 100%; height: 100%; border: none; border-radius: 12px; }
    .trailer-close {
      position: absolute; top: -44px; right: 0;
      background: none; border: none; color: var(--text);
      font-size: 1.5rem; cursor: pointer; line-height: 1; padding: 4px 8px;
      transition: color 0.2s;
    }
    .trailer-close:hover { color: var(--red); }

    @media (max-width: 768px) {
      .detail-hero-content { flex-direction: column; align-items: flex-start; padding: 32px 20px 28px; }
      .detail-poster, .detail-poster-placeholder { width: 130px; height: 190px; }
      .detail-body { grid-template-columns: 1fr; padding: 28px 20px; }
      nav { padding: 0 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">ANI<span>SCOUT</span></a>
    <a href="/" class="nav-back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 12L6 8l4-4"/>
      </svg>
      Back to search
    </a>
  </nav>

  <!-- TRAILER MODAL -->
  <div id="trailer-modal" onclick="if(event.target===this)closeTrailer()">
    <div class="trailer-modal-inner">
      <button type="button" class="trailer-close" onclick="closeTrailer()">✕</button>
      <iframe id="trailer-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
  </div>

  <div id="app">
    <div class="state-center">
      <div class="spinner"></div>
      <p>Loading anime details...</p>
    </div>
  </div>

  <!-- SIMILAR ANIME SECTION -->
  <div id="similar-section" class="similar-section" style="display:none">
    <div class="similar-section-label">More Like This</div>
    <h2 class="similar-section-title">Similar Anime</h2>
    <div id="similar-grid" class="similar-grid"></div>
    <div id="similar-load-more" class="similar-load-more" style="display:none">
      <button type="button" id="similar-load-btn" class="load-more-btn" onclick="loadMoreSimilar()">Load More</button>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-logo">ANI<span>SCOUT</span></div>
      <div class="footer-copy">© 2025 AniScout. Data from MyAnimeList & AniList.</div>
    </div>
  </footer>

  <script>
    const API = '';
    const params = new URLSearchParams(location.search);
    const malId = params.get('id');

    if (!malId) {
      document.getElementById('app').innerHTML = `
        <div class="state-center">
          <p>No anime ID provided.</p>
          <a href="/" style="color:var(--red)">← Back to search</a>
        </div>`;
    } else {
      loadAnime(malId);
    }

    async function loadAnime(id) {
      try {
        const res = await fetch(`${API}/api/anime?id=${id}`);
        if (!res.ok) throw new Error('Not found');
        const anime = await res.json();
        document.title = `${anime.title_english || anime.title} — AniScout`;
        similarGenres = (anime.genres || []).map(g => g.name).slice(0, 3);
        render(anime);
        requestAnimationFrame(initReadMore);
        loadSimilar(malId, similarGenres, 1);
        saveRecentlyViewed({
          malId: parseInt(id),
          title: anime.title_english || anime.title,
          poster: anime.anilistPoster || anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url,
          score: anime.score,
          year: anime.year || anime.aired?.prop?.from?.year,
        });
      } catch (err) {
        document.getElementById('app').innerHTML = `
          <div class="state-center">
            <p>Could not load anime details.</p>
            <a href="/" style="color:var(--red)">← Back to search</a>
          </div>`;
      }
    }

    function render(a) {
      const title    = a.title_english || a.title;
      const altTitle = [a.title !== title ? a.title : null, a.title_japanese].filter(Boolean).join(' · ');
      const poster   = a.anilistPoster || a.images?.jpg?.large_image_url || a.images?.jpg?.image_url;
      const banner   = a.bannerImage || poster;
      const score    = a.score ? parseFloat(a.score).toFixed(2) : null;
      const scoredBy = a.scored_by ? a.scored_by.toLocaleString() : null;

      // Aired dates
      const airedFrom = a.aired?.from ? new Date(a.aired.from).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : null;
      const airedTo   = a.aired?.to   ? new Date(a.aired.to).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : (a.status === 'Currently Airing' ? 'Present' : null);
      const airedStr  = [airedFrom, airedTo].filter(Boolean).join(' – ');

      // Season premiered
      const premiered = a.season && a.year ? `${a.season.charAt(0).toUpperCase() + a.season.slice(1)} ${a.year}` : (a.year || null);

      // Broadcast
      const broadcast = a.broadcast?.string || null;

      // Genres + themes
      const genres   = (a.genres  || []).map(g => g.name);
      const themes   = (a.themes  || []).map(t => t.name);
      const allTags  = [...genres, ...themes];

      // Studios / producers
      const studios   = (a.studios   || []).map(s => s.name).join(', ') || '—';
      const producers = (a.producers || []).map(p => p.name).join(', ') || '—';

      // Relations → find sequel/prequel for seasons section
      const relations = a.relations || [];
      const seasons = relations
        .filter(r => ['Sequel', 'Prequel', 'Alternative version', 'Side story', 'Parent story'].includes(r.relation))
        .flatMap(r => r.entry)
        .filter(e => e.type === 'anime')
        .slice(0, 8);

      // MAL link
      const malUrl = `https://myanimelist.net/anime/${a.mal_id}`;

      document.getElementById('app').innerHTML = `
        <!-- HERO -->
        <div class="detail-hero">
          <div class="detail-banner" style="background-image:url('${banner}')"></div>
          <div class="detail-banner-gradient"></div>
          <div class="detail-hero-content">
            ${poster
              ? `<img class="detail-poster" src="${poster}" alt="${title}" onerror="this.style.display='none'">`
              : `<div class="detail-poster-placeholder">No Image</div>`}
            <div class="detail-meta">
              <h1 class="detail-title">${title}</h1>
              ${altTitle ? `<div class="detail-alt-title">${altTitle}</div>` : ''}
              <div class="detail-badges">
                ${a.type    ? `<span class="badge badge-type">${a.type}</span>` : ''}
                ${a.rating  ? `<span class="badge badge-rating">${a.rating.split(' - ')[0]}</span>` : ''}
                ${a.episodes? `<span class="badge badge-eps">${a.episodes} Episodes</span>` : ''}
                ${a.status === 'Currently Airing' ? `<span class="badge badge-type">Airing</span>` : ''}
              </div>
              ${score ? `
                <div class="detail-score">
                  ★ ${score}
                  <span class="detail-score-sub">by ${scoredBy || '?'} users</span>
                </div>` : ''}
              ${a.trailer?.youtube_id ? `
                <button type="button" class="trailer-btn" onclick="openTrailer('${a.trailer.youtube_id}')">
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                  Watch Trailer
                </button>` : ''}
            </div>
          </div>
        </div>

        <!-- BODY -->
        <div class="detail-body">
          <!-- LEFT: Synopsis + Seasons -->
          <div>
            <div class="synopsis-label">Synopsis</div>
            <div class="synopsis-text collapsed" id="synopsis-text">${a.synopsis || 'No synopsis available.'}</div>
            <button class="read-more-btn" id="read-more-btn" onclick="toggleSynopsis()">Read more</button>

            ${seasons.length ? `
              <div class="seasons-section">
                <h2 class="seasons-title">Related</h2>
                <div class="seasons-grid">
                  <a href="/anime.html?id=${a.mal_id}" class="season-card active">
                    <div class="season-name">Current</div>
                    <div class="season-eps">${a.episodes ? a.episodes + ' eps' : 'Ongoing'}</div>
                  </a>
                  ${seasons.map(s => `
                    <a href="/anime.html?id=${s.mal_id}" class="season-card">
                      <div class="season-name">${s.name}</div>
                      <div class="season-eps">${s.type}</div>
                    </a>`).join('')}
                </div>
              </div>` : ''}
          </div>

          <!-- RIGHT: Info card -->
          <div class="info-card">
            ${row('Status',    a.status || '—')}
            ${row('Country',   'Japan')}
            ${row('Premiered', premiered || '—')}
            ${row('Aired',     airedStr  || '—')}
            ${row('Broadcast', broadcast || '—')}
            ${row('Episodes',  a.episodes ? String(a.episodes) : '—')}
            ${row('Duration',  a.duration || '—')}
            ${row('Studios',   studios)}
            ${row('Producers', producers)}
            ${allTags.length ? `
              <div class="info-row">
                <span class="info-key">Genres</span>
                <span class="info-val">${allTags.map(g => `<span class="genre-tag">${g}</span>`).join('')}</span>
              </div>` : ''}
            <div class="info-row">
              <span class="info-key">Links</span>
              <span class="info-val">
                <a href="${malUrl}" target="_blank" rel="noopener">MAL</a>
              </span>
            </div>
          </div>
        </div>`;
    }

    // ── Similar anime pagination ───────────────────────────────────────────────
    let similarPage = 1;
    let similarGenres = [];
    let similarHasNext = false;

    async function loadSimilar(id, genres, page = 1) {
      const genreParam = genres.join(',');
      const res = await fetch(`${API}/api/similar?id=${id}&page=${page}&genres=${encodeURIComponent(genreParam)}`);
      if (!res.ok) return;
      const data = await res.json();
      similarHasNext = data.hasNextPage;

      const grid = document.getElementById('similar-grid');
      (data.recommendations || []).forEach(anime => {
        const poster = anime.poster || `https://placehold.co/160x220/111119/E8272A?text=${encodeURIComponent(anime.title||'?')}`;
        const score  = anime.score ? `★ ${parseFloat(anime.score).toFixed(1)}` : '';
        const card   = document.createElement('a');
        card.href    = `/anime.html?id=${anime.malId}`;
        card.className = 'anime-card';
        card.innerHTML = `
          <div class="card-img">
            <img src="${poster}" alt="${anime.title}" loading="lazy" onerror="this.src='https://placehold.co/160x220/111119/E8272A?text=?'"/>
            <div class="card-img-overlay"></div>
            ${score ? `<span class="card-score">${score}</span>` : ''}
          </div>
          <div class="card-body">
            <div class="card-title">${anime.title||'Unknown'}</div>
            <div class="card-meta">${anime.year||''}${anime.episodes ? ' · '+anime.episodes+' eps' : ''}</div>
          </div>`;
        grid.appendChild(card);
      });

      document.getElementById('similar-section').style.display = 'block';
      document.getElementById('similar-load-more').style.display = similarHasNext ? 'block' : 'none';
    }

    async function loadMoreSimilar() {
      const btn = document.getElementById('similar-load-btn');
      btn.textContent = 'Loading...';
      btn.disabled = true;
      similarPage++;
      try {
        await loadSimilar(malId, similarGenres, similarPage);
      } catch {
        similarPage--;
      } finally {
        btn.textContent = 'Load More';
        btn.disabled = false;
      }
    }

    function row(key, val) {
      return `<div class="info-row"><span class="info-key">${key}</span><span class="info-val">${val}</span></div>`;
    }

    function toggleSynopsis() {
      const el  = document.getElementById('synopsis-text');
      const btn = document.getElementById('read-more-btn');
      const collapsed = el.classList.toggle('collapsed');
      btn.textContent = collapsed ? 'Read more' : 'Show less';
    }

    function initReadMore() {
      const el  = document.getElementById('synopsis-text');
      const btn = document.getElementById('read-more-btn');
      if (!el || !btn) return;
      // Temporarily uncollapse to measure full height
      el.classList.remove('collapsed');
      const fullHeight = el.scrollHeight;
      el.classList.add('collapsed');
      const clampedHeight = el.clientHeight;
      if (fullHeight <= clampedHeight) {
        btn.style.display = 'none';
        el.classList.remove('collapsed');
      }
    }

    // ── Trailer modal ─────────────────────────────────────────────────────────
    function openTrailer(youtubeId) {
      document.getElementById('trailer-iframe').src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1`;
      document.getElementById('trailer-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeTrailer() {
      document.getElementById('trailer-modal').classList.remove('open');
      document.getElementById('trailer-iframe').src = '';
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTrailer(); });

    // ── Recently Viewed ───────────────────────────────────────────────────────
    function saveRecentlyViewed(item) {
      try {
        let recent = JSON.parse(localStorage.getItem('aniscout_recent') || '[]');
        recent = recent.filter(r => r.malId !== item.malId);
        recent.unshift(item);
        localStorage.setItem('aniscout_recent', JSON.stringify(recent.slice(0, 15)));
      } catch {}
    }
  </script>
</body>
</html>
