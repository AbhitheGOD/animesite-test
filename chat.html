<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AniScout — Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/shared.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --red:    #E8272A;
      --orange: #F5A01A;
      --dark:   #08080E;
      --surface:#111119;
      --raised: #18182A;
      --border: rgba(255,255,255,0.07);
      --text:   #F0F0F8;
      --muted:  #7878A0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; line-height: 1.6; }
    h1, h2, h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(232,39,42,0.4); border-radius: 2px; }

    /* ── NAV ─────────────────────────────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 60px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      background: rgba(8,8,14,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }
    .nav-back {
      display: flex; align-items: center; gap: 8px; color: var(--muted);
      text-decoration: none; font-size: 0.88rem; font-weight: 500;
      transition: color 0.2s; flex-shrink: 0;
    }
    .nav-back:hover { color: var(--text); }
    .nav-back svg { width: 14px; height: 14px; }
    .nav-room { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; justify-content: center; }
    .nav-room-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem; letter-spacing: 0.06em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nav-invite {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 12px; border-radius: 6px;
      background: rgba(232,39,42,0.1); border: 1px solid rgba(232,39,42,0.25);
      cursor: pointer; transition: background 0.2s; flex-shrink: 0;
    }
    .nav-invite:hover { background: rgba(232,39,42,0.18); }
    .nav-invite-label { font-size: 0.72rem; color: var(--muted); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    .nav-invite-code { font-size: 0.85rem; font-weight: 700; color: var(--red); font-family: monospace; letter-spacing: 0.12em; }
    .nav-invite-copy { font-size: 0.75rem; color: var(--muted); transition: color 0.2s; }
    .nav-members-toggle {
      display: none; align-items: center; gap: 6px; padding: 6px 12px;
      background: none; border: 1px solid var(--border); border-radius: 7px;
      color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
      cursor: pointer; transition: border-color 0.2s, color 0.2s; flex-shrink: 0;
    }
    .nav-members-toggle:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    /* ── LAYOUT ──────────────────────────────────────────────────────────────── */
    .chat-wrap {
      position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
      display: flex; overflow: hidden;
    }

    /* ── MESSAGES AREA ───────────────────────────────────────────────────────── */
    .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
    .messages-area {
      flex: 1; overflow-y: auto; padding: 24px 24px 8px;
      display: flex; flex-direction: column; gap: 4px;
    }

    /* ── MESSAGE ITEMS ───────────────────────────────────────────────────────── */
    .msg-day { text-align: center; margin: 16px 0 8px; }
    .msg-day-label { display: inline-block; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 12px; background: var(--raised); border-radius: 20px; border: 1px solid var(--border); }

    .msg-item { display: flex; gap: 10px; padding: 3px 0; align-items: flex-start; }
    .msg-item.msg-own { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem; font-weight: 700; color: #fff;
      margin-top: 2px;
    }
    .msg-content { max-width: min(520px, 70%); }
    .msg-own .msg-content { align-items: flex-end; display: flex; flex-direction: column; }

    .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
    .msg-own .msg-header { flex-direction: row-reverse; }
    .msg-username { font-size: 0.8rem; font-weight: 600; color: var(--text); }
    .msg-time { font-size: 0.72rem; color: var(--muted); }

    .msg-bubble {
      padding: 10px 14px; border-radius: 14px; font-size: 0.9rem;
      background: var(--raised); border: 1px solid var(--border);
      color: var(--text); line-height: 1.55; word-break: break-word;
      border-bottom-left-radius: 4px;
    }
    .msg-own .msg-bubble { background: rgba(232,39,42,0.12); border-color: rgba(232,39,42,0.2); border-bottom-left-radius: 14px; border-bottom-right-radius: 4px; }

    /* ── ANIME CARD in chat ──────────────────────────────────────────────────── */
    .anime-msg-card {
      display: flex; gap: 12px; padding: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; margin-top: 6px; max-width: 320px;
      text-decoration: none; transition: border-color 0.2s;
    }
    .anime-msg-card:hover { border-color: rgba(232,39,42,0.3); }
    .msg-own .anime-msg-card { background: rgba(8,8,14,0.5); }
    .anime-msg-poster { width: 54px; height: 78px; object-fit: cover; border-radius: 7px; flex-shrink: 0; }
    .anime-msg-info { display: flex; flex-direction: column; justify-content: center; gap: 4px; min-width: 0; }
    .anime-msg-share-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
    .anime-msg-title { font-weight: 600; font-size: 0.88rem; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .anime-msg-meta { font-size: 0.78rem; color: var(--muted); }
    .anime-msg-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.78rem; font-weight: 600; color: var(--red);
      text-decoration: none; margin-top: 4px;
    }
    .anime-msg-btn:hover { text-decoration: underline; }

    /* ── INPUT BAR ───────────────────────────────────────────────────────────── */
    .chat-input-bar {
      padding: 14px 24px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: center;
      background: rgba(8,8,14,0.6);
    }
    .share-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 14px; background: var(--raised); border: 1px solid var(--border);
      border-radius: 9px; color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; font-weight: 500; cursor: pointer; flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s;
    }
    .share-btn:hover { border-color: rgba(232,39,42,0.4); color: var(--text); }
    .share-btn svg { width: 15px; height: 15px; }
    .msg-input-wrap { flex: 1; position: relative; }
    .msg-input {
      width: 100%; padding: 10px 16px; background: var(--raised);
      border: 1px solid var(--border); border-radius: 9px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
      outline: none; transition: border-color 0.2s;
      resize: none; min-height: 42px; max-height: 120px;
      overflow-y: auto; line-height: 1.5; display: block;
    }
    .msg-input:focus { border-color: rgba(232,39,42,0.4); }
    .msg-input::placeholder { color: var(--muted); }
    .send-btn {
      padding: 10px 18px; background: var(--red); border: none;
      border-radius: 9px; color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; font-weight: 600; cursor: pointer; flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 3px 12px rgba(232,39,42,0.3);
    }
    .send-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── SIDEBAR ─────────────────────────────────────────────────────────────── */
    .chat-sidebar {
      width: 240px; border-left: 1px solid var(--border);
      overflow-y: auto; padding: 20px 16px; flex-shrink: 0;
      background: var(--surface);
    }
    .sidebar-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .member-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; }
    .member-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #fff; flex-shrink: 0; }
    .member-name { font-size: 0.88rem; color: var(--text); font-weight: 500; }
    .member-you { font-size: 0.75rem; color: var(--muted); margin-left: 4px; }

    /* ── MODALS ──────────────────────────────────────────────────────────────── */
    .modal-bd {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(8,8,14,0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
    }
    .modal-bd.open { display: flex; }
    .modal-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 36px; width: min(460px, 94vw);
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
    }
    .modal-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--red); margin-bottom: 6px; }
    .modal-title { font-size: 2rem; color: var(--text); margin-bottom: 8px; }
    .modal-sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 20px; }
    .modal-search-input {
      width: 100%; padding: 11px 16px; background: var(--raised);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s; margin-bottom: 14px;
    }
    .modal-search-input:focus { border-color: rgba(232,39,42,0.5); }
    .modal-search-input::placeholder { color: var(--muted); }
    .search-results { max-height: 320px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .search-result-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 10px; background: var(--raised);
      border: 1px solid var(--border); cursor: pointer;
      transition: border-color 0.2s, background 0.15s;
    }
    .search-result-item:hover { border-color: rgba(232,39,42,0.35); background: rgba(232,39,42,0.06); }
    .result-poster { width: 36px; height: 52px; object-fit: cover; border-radius: 5px; flex-shrink: 0; }
    .result-info { flex: 1; min-width: 0; }
    .result-title { font-weight: 600; font-size: 0.88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .result-share { padding: 6px 14px; background: var(--red); border: none; border-radius: 7px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; flex-shrink: 0; transition: opacity 0.2s; }
    .result-share:hover { opacity: 0.85; }
    .search-empty { text-align: center; padding: 28px; color: var(--muted); font-size: 0.9rem; }
    .modal-close-btn {
      width: 100%; padding: 11px; background: none; border: 1px solid var(--border);
      border-radius: 10px; color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; cursor: pointer; margin-top: 14px;
      transition: border-color 0.2s, color 0.2s;
    }
    .modal-close-btn:hover { border-color: rgba(255,255,255,0.18); color: var(--text); }

    /* ── LOADING / ERROR STATES ──────────────────────────────────────────────── */
    .state-center { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 14px; color: var(--muted); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-sm { width: 24px; height: 24px; border-width: 2px; margin: 20px auto; }
    .copy-toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--raised); border: 1px solid var(--border); color: var(--text);
      padding: 8px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 500;
      opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 200;
    }
    .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── MOBILE ──────────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .chat-sidebar {
        position: fixed; top: 60px; right: 0; bottom: 0;
        z-index: 50; transform: translateX(100%);
        transition: transform 0.25s ease; width: 220px;
      }
      .chat-sidebar.open { transform: translateX(0); }
      .nav-members-toggle { display: flex; }
      .nav-room-name { display: none; }
      .share-btn span { display: none; }
      .share-btn { padding: 9px 11px; }
      nav { padding: 0 16px; }
      .messages-area { padding: 16px 16px 8px; }
      .chat-input-bar { padding: 12px 16px; }
    }

    /* SETTINGS */
    .settings-fab {
      position: fixed; bottom: 20px; right: 20px; z-index: 200;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--raised); border: 1px solid var(--border);
      color: var(--muted); font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .settings-fab:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .settings-panel {
      display: none; position: fixed; bottom: 68px; right: 20px; z-index: 200;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; width: 200px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .settings-panel.open { display: block; }
    .settings-info { font-size: 0.85rem; color: var(--muted); margin-bottom: 12px; }
    .settings-logout-btn {
      width: 100%; padding: 8px 12px;
      background: rgba(232,39,42,0.1); border: 1px solid rgba(232,39,42,0.25);
      border-radius: 8px; color: var(--red); font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .settings-logout-btn:hover { background: rgba(232,39,42,0.2); }
    #settings-logout-btn { display: none; }

    /* ── REPLY BANNER ───────────────────────────────────────────────────────── */
    .reply-banner {
      display: none; align-items: center; gap: 10px;
      padding: 8px 24px; background: var(--raised);
      border-top: 2px solid var(--red); border-bottom: 1px solid var(--border);
    }
    .reply-banner.open { display: flex; }
    .reply-banner-content { flex: 1; min-width: 0; }
    .reply-banner-label { font-size: 0.72rem; font-weight: 700; color: var(--red); display: block; letter-spacing: 0.04em; }
    .reply-banner-text { font-size: 0.8rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .reply-cancel-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1.1rem; padding: 4px 8px; transition: color 0.15s; flex-shrink: 0;
    }
    .reply-cancel-btn:hover { color: var(--text); }

    /* ── REPLY QUOTE in bubbles ─────────────────────────────────────────────── */
    .reply-quote {
      padding: 5px 10px; margin-bottom: 8px;
      background: rgba(255,255,255,0.04); border-left: 3px solid var(--red);
      border-radius: 4px;
    }
    .reply-quote-user { font-size: 0.72rem; font-weight: 700; color: var(--red); display: block; }
    .reply-quote-text { font-size: 0.78rem; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

    /* ── REPLY BUTTON (appears on hover) ────────────────────────────────────── */
    .msg-reply-btn {
      display: none; align-self: center; flex-shrink: 0;
      background: var(--raised); border: 1px solid var(--border);
      border-radius: 7px; color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem; font-weight: 500; padding: 5px 10px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s; white-space: nowrap;
    }
    .msg-reply-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }
    .msg-item:hover .msg-reply-btn { display: flex; align-items: center; gap: 4px; }

    /* ── DELETE BUTTON (own messages only, appears on hover) ─────────────────── */
    .msg-delete-btn {
      display: none; align-self: center; flex-shrink: 0;
      background: var(--raised); border: 1px solid rgba(232,39,42,0.2);
      border-radius: 7px; color: rgba(232,39,42,0.6); font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem; font-weight: 500; padding: 5px 9px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s; white-space: nowrap;
    }
    .msg-delete-btn:hover { color: var(--red); border-color: rgba(232,39,42,0.5); background: rgba(232,39,42,0.08); }
    .msg-item.msg-own:hover .msg-delete-btn { display: flex; align-items: center; }

    /* ── IMAGE MESSAGES ─────────────────────────────────────────────────────── */
    .img-msg {
      max-width: 280px; max-height: 300px; width: 100%;
      border-radius: 10px; display: block; cursor: zoom-in; object-fit: cover;
      transition: opacity 0.2s;
    }
    .img-msg:hover { opacity: 0.88; }
    .msg-bubble-img { padding: 5px; background: transparent !important; border: none !important; }

    /* ── IMAGE UPLOAD BUTTON ────────────────────────────────────────────────── */
    .img-upload-btn {
      display: flex; align-items: center; justify-content: center;
      padding: 9px 11px; background: var(--raised); border: 1px solid var(--border);
      border-radius: 9px; color: var(--muted); cursor: pointer; flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s;
    }
    .img-upload-btn:hover:not(:disabled) { border-color: rgba(232,39,42,0.4); color: var(--text); }
    .img-upload-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .img-upload-btn svg { width: 16px; height: 16px; }
    .img-file-input { display: none; }

    /* ── LIGHTBOX ───────────────────────────────────────────────────────────── */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.93); align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 10px; object-fit: contain; cursor: default; }
    .lightbox-close {
      position: absolute; top: 20px; right: 24px; background: none; border: none;
      color: rgba(255,255,255,0.5); font-size: 2rem; cursor: pointer;
      transition: color 0.2s; line-height: 1; padding: 4px;
    }
    .lightbox-close:hover { color: #fff; }

    /* ── ADMIN FEATURES ─────────────────────────────────────────────────────── */
    .crown-badge { font-size: 0.75rem; margin-left: 3px; line-height: 1; }

    .member-remove-btn {
      margin-left: auto; flex-shrink: 0;
      padding: 3px 9px; background: none;
      border: 1px solid rgba(232,39,42,0.25); border-radius: 5px;
      color: var(--red); font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .member-remove-btn:hover { background: rgba(232,39,42,0.12); }

    .nav-admin-btn {
      display: none; align-items: center; justify-content: center;
      padding: 6px 10px; background: none;
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--muted); font-size: 0.95rem; cursor: pointer; flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s;
      gap: 5px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500;
    }
    .nav-admin-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .nav-admin-btn.visible { display: flex; }

    .transfer-member-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; margin-bottom: 14px; }
    .transfer-member-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      background: var(--raised); border: 1px solid var(--border);
      cursor: pointer; transition: border-color 0.2s, background 0.15s;
    }
    .transfer-member-item:hover { border-color: rgba(232,39,42,0.35); background: rgba(232,39,42,0.06); }

    /* ── NAV PROFILE BUTTON ──────────────────────────────────────────────────── */
    .nav-profile-wrap { position: relative; flex-shrink: 0; }
    .nav-profile-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 12px; background: none;
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; font-weight: 500; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .nav-profile-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .nav-profile-btn svg { width: 14px; height: 14px; }
    .nav-profile-dropdown {
      display: none; position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px; min-width: 170px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7); z-index: 300;
    }
    .nav-profile-dropdown.open { display: block; }
    .profile-drop-user {
      padding: 6px 10px 10px; font-size: 0.8rem; color: var(--muted);
      border-bottom: 1px solid var(--border); margin-bottom: 6px;
      font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .profile-drop-link {
      display: block; padding: 8px 10px; font-size: 0.85rem; color: var(--text);
      text-decoration: none; border-radius: 7px; transition: background 0.15s;
    }
    .profile-drop-link:hover { background: var(--raised); }
    .profile-drop-logout {
      display: block; width: 100%; padding: 8px 10px; font-size: 0.85rem;
      color: var(--red); background: none; border: none;
      font-family: 'DM Sans', sans-serif; font-weight: 500;
      text-align: left; cursor: pointer; border-radius: 7px; transition: background 0.15s;
    }
    .profile-drop-logout:hover { background: rgba(232,39,42,0.1); }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="/rooms.html" class="nav-back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg>
      Rooms
    </a>
    <div class="nav-room">
      <span class="nav-room-name" id="nav-room-name">Loading…</span>
      <button type="button" class="nav-invite" id="nav-invite" onclick="copyInviteCode()" title="Click to copy invite code">
        <span class="nav-invite-label">Invite</span>
        <span class="nav-invite-code" id="nav-invite-code">——</span>
        <span class="nav-invite-copy" id="copy-hint">📋</span>
      </button>
    </div>
    <button type="button" id="admin-gear-btn" class="nav-admin-btn" onclick="openTransferModal()" title="Room Admin Settings">
      ⚙ Admin
    </button>
    <div class="nav-profile-wrap">
      <button type="button" id="nav-profile-btn" class="nav-profile-btn" onclick="toggleProfileDropdown()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span id="nav-profile-label">…</span>
      </button>
      <div id="nav-profile-dropdown" class="nav-profile-dropdown">
        <div class="profile-drop-user" id="profile-drop-user">…</div>
        <a href="/watchlist.html" class="profile-drop-link">My Watchlist</a>
        <button type="button" class="profile-drop-logout" onclick="doSignOut()">Logout</button>
      </div>
    </div>
    <button type="button" class="nav-members-toggle" onclick="toggleSidebar()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
      Members
    </button>
  </nav>

  <!-- TRANSFER ADMIN MODAL -->
  <div id="modal-transfer" class="modal-bd" onclick="if(event.target===this)closeTransferModal()">
    <div class="modal-card">
      <div class="modal-label">Room Admin</div>
      <h2 class="modal-title">TRANSFER ADMIN</h2>
      <p class="modal-sub">Choose a member to become the new room admin. You will lose your admin role.</p>
      <div class="transfer-member-list" id="transfer-member-list"></div>
      <button type="button" class="modal-close-btn" onclick="closeTransferModal()">Cancel</button>
    </div>
  </div>

  <!-- SHARE ANIME MODAL -->
  <div id="modal-anime" class="modal-bd" onclick="if(event.target===this)closeAnimeModal()">
    <div class="modal-card">
      <div class="modal-label">Share Anime</div>
      <h2 class="modal-title">PICK AN ANIME</h2>
      <p class="modal-sub">Search and share any anime directly into the chat.</p>
      <input class="modal-search-input" id="anime-search-input" placeholder="Search anime…" autocomplete="off" spellcheck="false" />
      <div class="search-results" id="anime-search-results">
        <div class="search-empty">Type to search…</div>
      </div>
      <button type="button" class="modal-close-btn" onclick="closeAnimeModal()">Cancel</button>
    </div>
  </div>

  <!-- COPY TOAST -->
  <div class="copy-toast" id="copy-toast">Copied!</div>

  <!-- CHAT WRAP -->
  <div class="chat-wrap">
    <!-- MAIN -->
    <div class="chat-main">
      <div class="messages-area" id="messages-area">
        <div class="state-center"><div class="spinner"></div><p>Loading messages…</p></div>
      </div>
      <div id="reply-banner" class="reply-banner">
        <div class="reply-banner-content">
          <span class="reply-banner-label" id="reply-banner-user">Replying to…</span>
          <span class="reply-banner-text" id="reply-banner-text"></span>
        </div>
        <button type="button" class="reply-cancel-btn" onclick="clearReply()" title="Cancel reply">✕</button>
      </div>
      <div class="chat-input-bar">
        <button type="button" class="share-btn" onclick="openAnimeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="10" rx="1"/><rect x="14" y="3" width="7" height="10" rx="1"/><path d="M3 17h18M3 21h18"/></svg>
          <span>Share Anime</span>
        </button>
        <input type="file" id="img-file-input" class="img-file-input" accept="image/jpeg,image/png,image/gif,image/webp" />
        <button type="button" class="img-upload-btn" id="img-upload-btn" title="Share image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <div class="msg-input-wrap">
          <textarea class="msg-input" id="msg-input" placeholder="Send a message…" maxlength="2000" autocomplete="off" rows="1"></textarea>
        </div>
        <button type="button" class="send-btn" id="send-btn" onclick="sendTextMessage()">Send</button>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="chat-sidebar" id="chat-sidebar">
      <div class="sidebar-title">Members</div>
      <div id="members-list"><div class="spinner spinner-sm"></div></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const roomId = params.get('room');
    if (!roomId) location.href = '/rooms.html';

    let sb = null;
    let currentUser = null;
    let username = null;
    let room = null;
    let channel = null;
    const renderedIds = new Set();
    let replyingTo = null; // { id, username, preview }
    let isAdmin = false;
    const adminUserIds = new Set(); // tracks which user_ids are room admins
    let transferCandidates = [];

    // ── Bootstrap ─────────────────────────────────────────────────────────────
    async function init() {
      let config;
      try {
        const res = await fetch('/api/supabase-config');
        config = await res.json();
      } catch {
        showError('Could not reach server. Please refresh.'); return;
      }
      if (!config.url || !config.anonKey) {
        showError('Server not configured.'); return;
      }

      sb = supabase.createClient(config.url, config.anonKey);

      const { data: { session } } = await sb.auth.getSession();
      if (!session) { location.href = '/rooms.html'; return; }

      currentUser = session.user;
      username = localStorage.getItem('aniscout_username');
      if (!username) {
        const { data: uRow } = await sb.from('usernames').select('username').eq('user_id', currentUser.id).maybeSingle();
        if (uRow) { username = uRow.username; localStorage.setItem('aniscout_username', username); }
      }
      username = username || 'Anonymous';

      // Check membership and load admin status
      const { data: membership } = await sb
        .from('room_members').select('user_id, is_admin')
        .eq('room_id', roomId).eq('user_id', currentUser.id).maybeSingle();

      if (!membership) { location.href = '/rooms.html'; return; }
      isAdmin = membership.is_admin === true;

      // Load room data
      const { data: roomData } = await sb
        .from('rooms').select('id, name, invite_code').eq('id', roomId).single();
      if (!roomData) { location.href = '/rooms.html'; return; }

      room = roomData;
      document.title = `${room.name} — AniScout`;
      document.getElementById('nav-room-name').textContent = room.name;
      document.getElementById('nav-invite-code').textContent = room.invite_code;

      if (isAdmin) document.getElementById('admin-gear-btn').classList.add('visible');

      // Load members first so adminUserIds is populated before messages render
      await loadMembers();
      await loadMessages();
      subscribeToRoom();
      updateSettingsPanel();
      document.getElementById('nav-profile-label').textContent = username;
      document.getElementById('profile-drop-user').textContent = username;
    }

    // ── Load initial messages ─────────────────────────────────────────────────
    async function loadMessages() {
      const area = document.getElementById('messages-area');
      const { data: msgs, error } = await sb
        .from('messages').select('*')
        .eq('room_id', roomId)
        .order('created_at', { ascending: true })
        .limit(50);

      if (error) { area.innerHTML = `<div class="state-center"><p style="color:var(--red)">${escHtml(error.message)}</p></div>`; return; }

      area.innerHTML = '';
      if (!msgs.length) {
        area.innerHTML = `<div class="state-center" style="opacity:0.5"><p style="font-size:0.9rem">No messages yet.<br>Be the first to say something!</p></div>`;
        return;
      }

      let lastDate = '';
      msgs.forEach(msg => {
        const d = new Date(msg.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        if (d !== lastDate) { area.appendChild(makeDateDivider(d)); lastDate = d; }
        area.appendChild(makeMessageEl(msg));
        renderedIds.add(msg.id);
      });
      scrollToBottom(true);
    }

    // ── Load members ─────────────────────────────────────────────────────────
    async function loadMembers() {
      const { data: members } = await sb
        .from('room_members').select('user_id, username, is_admin').eq('room_id', roomId);
      renderMembers(members || []);
    }

    function renderMembers(members) {
      // Rebuild admin tracking so crown shows correctly in messages
      adminUserIds.clear();
      members.filter(m => m.is_admin).forEach(m => adminUserIds.add(m.user_id));

      const el = document.getElementById('members-list');
      if (!members.length) { el.innerHTML = '<p style="color:var(--muted);font-size:0.85rem">No members</p>'; return; }
      el.innerHTML = members.map(m => {
        const isYou = m.user_id === currentUser.id;
        const crown = m.is_admin ? '<span class="crown-badge" title="Room Admin">👑</span>' : '';
        const removeBtn = isAdmin && !isYou
          ? `<button type="button" class="member-remove-btn" data-uid="${escAttr(m.user_id)}" data-uname="${escAttr(m.username)}">Remove</button>`
          : '';
        return `
          <div class="member-item">
            <div class="member-avatar" style="background:${userColor(m.username)}">${escHtml(m.username[0].toUpperCase())}</div>
            <span class="member-name">${escHtml(m.username)}${crown}</span>
            ${isYou ? '<span class="member-you">(you)</span>' : ''}
            ${removeBtn}
          </div>`;
      }).join('');
    }

    // ── Kicked handler ────────────────────────────────────────────────────────
    function handleKicked() {
      showToast('You have been removed from this room.');
      sb.removeAllChannels();
      localStorage.removeItem('aniscout_current_room');
      setTimeout(() => { location.href = '/rooms.html'; }, 1500);
    }

    // ── Realtime subscription ─────────────────────────────────────────────────
    function subscribeToRoom() {
      channel = sb.channel(`room:${roomId}`)
        .on('postgres_changes', {
          event: 'INSERT', schema: 'public', table: 'messages',
          filter: `room_id=eq.${roomId}`
        }, payload => {
          if (renderedIds.has(payload.new.id)) return;
          const area = document.getElementById('messages-area');
          // Remove empty-state placeholder if present
          const placeholder = area.querySelector('.state-center');
          if (placeholder) placeholder.remove();
          area.appendChild(makeMessageEl(payload.new));
          renderedIds.add(payload.new.id);
          scrollToBottom();
        })
        .on('postgres_changes', {
          event: 'INSERT', schema: 'public', table: 'room_members',
          filter: `room_id=eq.${roomId}`
        }, () => {
          loadMembers();
        })
        .on('postgres_changes', {
          event: 'DELETE', schema: 'public', table: 'room_members',
          filter: `room_id=eq.${roomId}`
        }, async payload => {
          // Check if payload.old has data (requires REPLICA IDENTITY FULL)
          const kickedId = payload.old?.user_id;
          if (kickedId === currentUser.id) {
            handleKicked(); return;
          }
          // Fallback: re-check own membership in case payload.old was empty
          const { data: still } = await sb.from('room_members')
            .select('user_id').eq('room_id', roomId).eq('user_id', currentUser.id).maybeSingle();
          if (!still) {
            handleKicked(); return;
          }
          loadMembers();
        })
        .on('postgres_changes', {
          event: 'UPDATE', schema: 'public', table: 'room_members',
          filter: `room_id=eq.${roomId}`
        }, payload => {
          loadMembers(); // Refresh crowns when admin role changes
          // If current user's own row was updated, sync local admin state
          if (payload.new && payload.new.user_id === currentUser.id) {
            isAdmin = payload.new.is_admin === true;
            const gearBtn = document.getElementById('admin-gear-btn');
            if (isAdmin) gearBtn.classList.add('visible');
            else gearBtn.classList.remove('visible');
          }
        })
        .on('broadcast', { event: 'kick' }, payload => {
          if (payload.payload?.userId === currentUser.id) {
            handleKicked();
          }
        })
        .on('broadcast', { event: 'msg_delete' }, payload => {
          const id = payload.payload?.msgId;
          if (id) {
            const el = document.querySelector(`.msg-item[data-id="${id}"]`);
            if (el) el.remove();
            renderedIds.delete(id);
          }
        })
        .subscribe();
    }

    // ── Send text message ─────────────────────────────────────────────────────
    async function sendTextMessage() {
      const input = document.getElementById('msg-input');
      const btn   = document.getElementById('send-btn');
      const text  = input.value.trim();
      if (!text) return;

      const reply = replyingTo;
      input.value = '';
      input.style.height = 'auto';
      clearReply();
      btn.disabled = true;

      const { error } = await sb.from('messages').insert({
        room_id: roomId, user_id: currentUser.id,
        username, type: 'text', content: text,
        ...(reply ? { reply_to: reply } : {})
      });
      if (error) {
        input.value = text;
        showToast('Failed to send: ' + error.message);
        console.error('[send]', error.message);
      }
      btn.disabled = false;
      input.focus();
    }

    // ── Reply state ───────────────────────────────────────────────────────────
    function setReply(id, uname, preview) {
      replyingTo = { id, username: uname, preview: preview.slice(0, 80) };
      document.getElementById('reply-banner-user').textContent = `Replying to ${uname}`;
      document.getElementById('reply-banner-text').textContent = replyingTo.preview;
      document.getElementById('reply-banner').classList.add('open');
      document.getElementById('msg-input').focus();
    }

    function clearReply() {
      replyingTo = null;
      document.getElementById('reply-banner').classList.remove('open');
    }

    // ── Remove member (admin only) ────────────────────────────────────────────
    async function removeMember(userId, uname) {
      if (!confirm(`Remove @${uname} from this room?`)) return;
      const { error } = await sb.from('room_members')
        .delete().eq('room_id', roomId).eq('user_id', userId);
      if (error) { showToast('Could not remove member. Try again.'); return; }
      // Broadcast kick event so the removed user's client redirects immediately
      await channel.send({ type: 'broadcast', event: 'kick', payload: { userId } });
      loadMembers();
    }

    // ── Transfer admin modal ──────────────────────────────────────────────────
    async function openTransferModal() {
      const { data: members } = await sb
        .from('room_members').select('user_id, username, is_admin').eq('room_id', roomId);
      transferCandidates = (members || []).filter(m => m.user_id !== currentUser.id);

      const el = document.getElementById('transfer-member-list');
      if (!transferCandidates.length) {
        el.innerHTML = '<p style="color:var(--muted);font-size:0.88rem;text-align:center;padding:16px 0">No other members in this room.</p>';
      } else {
        el.innerHTML = transferCandidates.map((m, i) => `
          <div class="transfer-member-item" data-idx="${i}">
            <div class="member-avatar" style="background:${userColor(m.username)}">${escHtml(m.username[0].toUpperCase())}</div>
            <span class="member-name">${escHtml(m.username)}</span>
            ${m.is_admin ? '<span class="crown-badge" title="Current Admin">👑</span>' : ''}
          </div>`).join('');
      }
      document.getElementById('modal-transfer').classList.add('open');
    }

    function closeTransferModal() {
      document.getElementById('modal-transfer').classList.remove('open');
    }

    async function transferAdmin(idx) {
      const m = transferCandidates[idx];
      if (!m) return;
      if (!confirm(`Transfer admin to @${m.username}?\n\nYou will lose your admin role.`)) return;

      const { error: e1 } = await sb.from('room_members')
        .update({ is_admin: true }).eq('room_id', roomId).eq('user_id', m.user_id);
      if (e1) { showToast('Transfer failed.'); return; }

      const { error: e2 } = await sb.from('room_members')
        .update({ is_admin: false }).eq('room_id', roomId).eq('user_id', currentUser.id);
      if (e2) { showToast('Transfer incomplete — contact support.'); return; }

      isAdmin = false;
      document.getElementById('admin-gear-btn').classList.remove('visible');
      closeTransferModal();
      loadMembers();
      showToast(`@${m.username} is now the room admin.`);
    }

    // ── Image upload ──────────────────────────────────────────────────────────
    async function uploadImageFile(file) {
      if (file.size > 5 * 1024 * 1024) { showToast('Image must be under 5MB'); return; }
      const btn = document.getElementById('img-upload-btn');
      btn.disabled = true;
      try {
        const ext  = file.name ? file.name.split('.').pop().toLowerCase() : (file.type.split('/')[1] || 'png');
        const path = `${roomId}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
        const { error: upErr } = await sb.storage.from('chat-images').upload(path, file, { cacheControl: '3600', upsert: false });
        if (upErr) throw upErr;
        const { data: { publicUrl } } = sb.storage.from('chat-images').getPublicUrl(path);
        const { error: insErr } = await sb.from('messages').insert({
          room_id: roomId, user_id: currentUser.id,
          username, type: 'image', content: publicUrl
        });
        if (insErr) throw insErr;
      } catch (err) {
        showToast('Upload failed: ' + err.message);
        console.error('[upload]', err.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function handleImageSelect(e) {
      const file = e.target.files[0];
      e.target.value = '';
      if (!file) return;
      await uploadImageFile(file);
    }

    // ── Delete own message ────────────────────────────────────────────────────
    async function deleteMessage(msgId, type, content) {
      if (!confirm('Delete this message?')) return;
      const { error } = await sb.from('messages')
        .delete().eq('id', msgId).eq('user_id', currentUser.id);
      if (error) { showToast('Could not delete message.'); return; }
      // Delete image from storage too
      if (type === 'image' && content) {
        const parts = content.split('/chat-images/');
        if (parts[1]) await sb.storage.from('chat-images').remove([parts[1]]);
      }
      // Remove from own DOM immediately
      const el = document.querySelector(`.msg-item[data-id="${msgId}"]`);
      if (el) el.remove();
      renderedIds.delete(msgId);
      // Broadcast so other clients remove it too
      await channel.send({ type: 'broadcast', event: 'msg_delete', payload: { msgId } });
    }

    // ── Lightbox ──────────────────────────────────────────────────────────────
    function openLightbox(url) {
      document.getElementById('lightbox-img').src = url;
      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lightbox-img').src = '';
    }

    // ── Send anime card message ───────────────────────────────────────────────
    async function sendAnimeMessage(anime) {
      closeAnimeModal();
      const { error } = await sb.from('messages').insert({
        room_id: roomId, user_id: currentUser.id,
        username, type: 'anime',
        anime_payload: {
          malId: anime.malId, title: anime.title,
          poster: anime.poster, score: anime.score,
          year: anime.year, episodes: anime.episodes
        }
      });
      if (error) {
        showToast('Failed to share anime: ' + error.message);
        console.error('[send-anime]', error.message);
      }
    }

    // ── DOM builders ──────────────────────────────────────────────────────────
    function makeDateDivider(label) {
      const el = document.createElement('div');
      el.className = 'msg-day';
      el.innerHTML = `<span class="msg-day-label">${label}</span>`;
      return el;
    }

    function makeMessageEl(msg) {
      const isOwn = msg.user_id === currentUser.id;
      const el = document.createElement('div');
      el.className = `msg-item${isOwn ? ' msg-own' : ''}`;
      el.dataset.id = msg.id;

      const time    = new Date(msg.created_at).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      const color   = userColor(msg.username);
      const initial = msg.username[0].toUpperCase();

      // Reply quote block
      const replyHtml = msg.reply_to ? `
        <div class="reply-quote">
          <span class="reply-quote-user">${escHtml(msg.reply_to.username)}</span>
          <span class="reply-quote-text">${escHtml(msg.reply_to.preview || '')}</span>
        </div>` : '';

      // Text to store as reply preview for this message
      let replyPreview = '';
      if (msg.type === 'text')        replyPreview = msg.content || '';
      else if (msg.type === 'image')  replyPreview = '[Image]';
      else if (msg.type === 'anime')  replyPreview = `[Anime: ${msg.anime_payload?.title || 'Unknown'}]`;

      const crownHtml = adminUserIds.has(msg.user_id) ? '<span class="crown-badge" title="Room Admin">👑</span>' : '';
      const header = `
        <div class="msg-header">
          <span class="msg-username">${escHtml(msg.username)}${crownHtml}</span>
          <span class="msg-time">${time}</span>
        </div>`;

      let bodyHtml;
      if (msg.type === 'anime' && msg.anime_payload) {
        const a    = msg.anime_payload;
        const meta = [a.year, a.score ? `★${parseFloat(a.score).toFixed(1)}` : null, a.episodes ? `${a.episodes} eps` : null].filter(Boolean).join(' · ');
        bodyHtml = `${header}${replyHtml}
          <a href="/anime.html?id=${a.malId}" class="anime-msg-card" target="_blank" rel="noopener">
            ${a.poster ? `<img class="anime-msg-poster" src="${escHtml(a.poster)}" alt="${escHtml(a.title||'')}" loading="lazy" onerror="this.style.display='none'" />` : ''}
            <div class="anime-msg-info">
              <span class="anime-msg-share-label">Shared anime</span>
              <div class="anime-msg-title">${escHtml(a.title || 'Unknown')}</div>
              <div class="anime-msg-meta">${escHtml(meta)}</div>
              <span class="anime-msg-btn">View →</span>
            </div>
          </a>`;
      } else if (msg.type === 'image') {
        bodyHtml = `${header}${replyHtml}
          <div class="msg-bubble msg-bubble-img">
            <img class="img-msg" src="${escHtml(msg.content || '')}" alt="Shared image" loading="lazy" />
          </div>`;
      } else {
        const safeContent = escHtml(msg.content || '').replace(/\n/g, '<br>');
        bodyHtml = `${header}
          <div class="msg-bubble">${replyHtml}${safeContent}</div>`;
      }

      const deleteBtn = isOwn
        ? `<button type="button" class="msg-delete-btn" data-id="${escAttr(msg.id)}" data-type="${escAttr(msg.type)}" data-content="${escAttr(msg.content||'')}">🗑</button>`
        : '';
      el.innerHTML = `
        <div class="msg-avatar" style="background:${color}">${initial}</div>
        <div class="msg-content">${bodyHtml}</div>
        <button type="button" class="msg-reply-btn"
          data-id="${escAttr(msg.id)}"
          data-user="${escAttr(msg.username)}"
          data-preview="${escAttr(replyPreview)}">↩ Reply</button>
        ${deleteBtn}`;
      return el;
    }

    // ── Scroll ────────────────────────────────────────────────────────────────
    function scrollToBottom(instant = false) {
      const area = document.getElementById('messages-area');
      area.scrollTo({ top: area.scrollHeight, behavior: instant ? 'auto' : 'smooth' });
    }

    // ── Share anime modal ─────────────────────────────────────────────────────
    let searchTimer = null;

    function openAnimeModal() {
      document.getElementById('modal-anime').classList.add('open');
      document.getElementById('anime-search-input').value = '';
      document.getElementById('anime-search-results').innerHTML = '<div class="search-empty">Type to search…</div>';
      setTimeout(() => document.getElementById('anime-search-input').focus(), 50);
    }

    function closeAnimeModal() {
      document.getElementById('modal-anime').classList.remove('open');
      clearTimeout(searchTimer);
    }

    document.getElementById('anime-search-input').addEventListener('input', function() {
      clearTimeout(searchTimer);
      const q = this.value.trim();
      if (!q || q.length < 2) {
        document.getElementById('anime-search-results').innerHTML = '<div class="search-empty">Type to search…</div>';
        return;
      }
      document.getElementById('anime-search-results').innerHTML = '<div class="search-empty"><div class="spinner" style="width:24px;height:24px;border-width:2px;margin:0 auto"></div></div>';
      searchTimer = setTimeout(() => runAnimeSearch(q), 320);
    });

    async function runAnimeSearch(q) {
      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const results = await res.json();
        const el = document.getElementById('anime-search-results');

        if (!results.length) {
          el.innerHTML = '<div class="search-empty">No results found.</div>';
          return;
        }

        el.innerHTML = results.map((a, i) => {
          const meta = [a.year, a.score ? `★${parseFloat(a.score).toFixed(1)}` : null].filter(Boolean).join(' · ');
          return `
            <div class="search-result-item" data-idx="${i}">
              ${a.poster ? `<img class="result-poster" src="${escHtml(a.poster)}" alt="" loading="lazy" onerror="this.style.display='none'" />` : ''}
              <div class="result-info">
                <div class="result-title">${escHtml(a.title || 'Unknown')}</div>
                <div class="result-meta">${escHtml(meta)}</div>
              </div>
              <button class="result-share" onclick="sendAnimeMessage(${escAttr(JSON.stringify(a))})">Share</button>
            </div>`;
        }).join('');
      } catch {
        document.getElementById('anime-search-results').innerHTML = '<div class="search-empty" style="color:var(--red)">Search failed. Try again.</div>';
      }
    }

    // ── Members sidebar toggle (mobile) ───────────────────────────────────────
    function toggleSidebar() {
      document.getElementById('chat-sidebar').classList.toggle('open');
    }

    // ── Copy invite code ──────────────────────────────────────────────────────
    async function copyInviteCode() {
      if (!room) return;
      try {
        await navigator.clipboard.writeText(room.invite_code);
        const hint = document.getElementById('copy-hint');
        hint.textContent = '✓';
        showToast('Invite code copied!');
        setTimeout(() => { hint.textContent = '📋'; }, 2000);
      } catch {
        showToast(room.invite_code);
      }
    }

    function showToast(msg) {
      const t = document.getElementById('copy-toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ── Utils ─────────────────────────────────────────────────────────────────
    const USER_COLORS = ['#E8272A','#F5A01A','#4CAF50','#2196F3','#9C27B0','#FF5722','#00BCD4','#FF4081'];
    function userColor(name) {
      let hash = 0;
      for (const c of (name || '?')) hash = (hash * 31 + c.charCodeAt(0)) >>> 0;
      return USER_COLORS[hash % USER_COLORS.length];
    }
    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(s) {
      return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function showError(msg) {
      document.getElementById('messages-area').innerHTML = `<div class="state-center"><p style="color:var(--red)">${msg}</p><a href="/rooms.html" style="color:var(--red);font-size:0.88rem">← Back to Rooms</a></div>`;
    }

    // ── Keyboard & input events ───────────────────────────────────────────────
    const msgInput = document.getElementById('msg-input');
    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTextMessage(); }
    });
    msgInput.addEventListener('input', () => {
      msgInput.style.height = 'auto';
      msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
    });
    document.getElementById('img-upload-btn').addEventListener('click', () => {
      document.getElementById('img-file-input').click();
    });
    document.getElementById('img-file-input').addEventListener('change', handleImageSelect);
    // Reply button delegation
    document.getElementById('messages-area').addEventListener('click', e => {
      const btn = e.target.closest('.msg-reply-btn');
      if (btn) setReply(btn.dataset.id, btn.dataset.user, btn.dataset.preview);
    });
    // Delete button delegation (own messages)
    document.getElementById('messages-area').addEventListener('click', e => {
      const btn = e.target.closest('.msg-delete-btn');
      if (btn) deleteMessage(btn.dataset.id, btn.dataset.type, btn.dataset.content);
    });
    // Paste image from clipboard
    msgInput.addEventListener('paste', e => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const file = item.getAsFile();
          if (file && sb) uploadImageFile(file);
          return;
        }
      }
    });
    // Lightbox clicks on images
    document.getElementById('messages-area').addEventListener('click', e => {
      const img = e.target.closest('.img-msg');
      if (img) openLightbox(img.src);
    });
    // Remove member delegation (admin only)
    document.getElementById('members-list').addEventListener('click', e => {
      const btn = e.target.closest('.member-remove-btn');
      if (btn) removeMember(btn.dataset.uid, btn.dataset.uname);
    });
    // Transfer admin delegation
    document.getElementById('transfer-member-list').addEventListener('click', e => {
      const item = e.target.closest('.transfer-member-item');
      if (item) transferAdmin(parseInt(item.dataset.idx));
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeAnimeModal(); closeLightbox(); closeTransferModal(); }
    });

    // ── Settings panel ────────────────────────────────────────────────────────
    function toggleSettings() {
      document.getElementById('settings-panel').classList.toggle('open');
    }
    function updateSettingsPanel() {
      const info = document.getElementById('settings-info');
      const logoutBtn = document.getElementById('settings-logout-btn');
      if (username) {
        info.textContent = `Signed in as ${username}`;
        logoutBtn.style.display = 'block';
      } else {
        info.textContent = 'Not signed in';
        logoutBtn.style.display = 'none';
      }
    }
    async function doSignOut() {
      if (sb) await sb.auth.signOut();
      localStorage.removeItem('aniscout_username');
      localStorage.removeItem('aniscout_session');
      document.getElementById('settings-panel').classList.remove('open');
      location.href = '/rooms.html';
    }
    function toggleProfileDropdown() {
      document.getElementById('nav-profile-dropdown').classList.toggle('open');
    }

    document.addEventListener('click', e => {
      const panel = document.getElementById('settings-panel');
      const fab = document.querySelector('.settings-fab');
      if (panel && fab && !panel.contains(e.target) && !fab.contains(e.target)) {
        panel.classList.remove('open');
      }
      const profileWrap = document.querySelector('.nav-profile-wrap');
      if (profileWrap && !profileWrap.contains(e.target)) {
        const dd = document.getElementById('nav-profile-dropdown');
        if (dd) dd.classList.remove('open');
      }
    });

    init();
  </script>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <button type="button" class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="Full size image" />
  </div>

  <!-- SETTINGS -->
  <div id="settings-panel" class="settings-panel">
    <div id="settings-info" class="settings-info">Not signed in</div>
    <button type="button" onclick="doSignOut()" id="settings-logout-btn" class="settings-logout-btn">Sign Out</button>
  </div>
  <button type="button" onclick="toggleSettings()" class="settings-fab" title="Settings">⚙</button>

  <script src="/assets/shared.js"></script>
</body>
</html>
